<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>排班系統</title>
<style>
  :root{--bg:#f4f5f7;--card:#fff;--line:#e3e5ea;--ink:#1c1d22;--mut:#6b6f76;--info:#185fa5;--infobg:#e6f1fb;
    --work:#85b7eb;--workbg:#e6f1fb;--ot:#ef9f27;--otbg:#faeeda;--lv:#afa9ec;--lvbg:#eeedfe;--danger:#a32d2d;--dangerbg:#fcebeb;--ok:#0f6e56;--okbg:#e1f5ee;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;min-width:320px}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
  #app{width:100%;max-width:480px;margin:0 auto;background:var(--bg)}
  .top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border-bottom:.5px solid var(--line);position:sticky;top:0;z-index:5}
  .top b{font-size:16px;font-weight:600}
  .body{padding:12px 12px 80px}
  .card{background:var(--card);border:.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border:.5px solid var(--line);border-radius:9px;font-size:15px;background:var(--card);cursor:pointer}
  .btn.pri{background:var(--info);color:#fff;border-color:var(--info)}
  .btn.dg{color:var(--danger);border-color:#f0a0a0}
  .btn:active{transform:scale(.98)}
  .in{width:100%;height:42px;border:.5px solid var(--line);border-radius:9px;padding:0 12px;font-size:15px;margin-top:6px}
  .lbl{font-size:13px;color:var(--mut);margin-top:10px}
  .seg{display:flex;border:.5px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:10px}
  .seg div{flex:1;text-align:center;padding:9px;font-size:14px}.seg .on{background:var(--info);color:#fff;font-weight:600}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .dow{font-size:12px;color:var(--mut);text-align:center;padding:2px}
  .cell{border-radius:7px;min-height:52px;padding:4px;border:.5px solid var(--line);font-size:12px;position:relative;cursor:pointer}
  .cell .dn{color:var(--mut)}.cell .st{font-weight:600;line-height:1.25}.cell .mc{font-family:ui-monospace,monospace}
  .work{background:var(--workbg);border-color:var(--work)}.work .st,.work .mc{color:#0c447c}
  .ot{background:var(--otbg);border-color:var(--ot)}.ot .st,.ot .mc{color:#633806}
  .lv{background:var(--lvbg);border-color:var(--lv)}.lv .st{color:#26215c}
  .xx{position:absolute;top:3px;right:5px;color:var(--danger);font-weight:700}
  .tag{font-size:11px;padding:0 4px;border-radius:4px;background:#cecbf6;color:#26215c;font-weight:600}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:12px;color:var(--mut)}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:-1px;margin-right:3px}
  .row{display:flex;align-items:center;justify-content:space-between;padding:11px 2px;border-bottom:.5px solid var(--line);gap:8px}
  .row:last-child{border:none}
  .pill{font-size:13px;padding:5px 11px;border:.5px solid var(--line);border-radius:14px;cursor:pointer;white-space:nowrap}
  .pill.on{background:var(--okbg);border-color:#5dcaa5;color:var(--ok);font-weight:600}
  .pill.no{background:var(--dangerbg);border-color:#f0a0a0;color:var(--danger);font-weight:600}
  .tab{display:flex;background:var(--card);border-top:.5px solid var(--line);position:sticky;bottom:0}
  .tab div{flex:1;text-align:center;padding:8px 0 9px;font-size:11px;color:var(--mut);cursor:pointer}
  .tab div.on{color:var(--info)}.tab .ic{display:block;font-size:21px;line-height:1.1}
  .gw{overflow-x:auto;border:.5px solid var(--line);border-radius:9px}
  table.mt{border-collapse:collapse;font-size:12px;white-space:nowrap}
  table.mt th,table.mt td{border:.5px solid var(--line);padding:5px 7px;text-align:center;min-width:48px}
  table.mt th{background:#f1efe8;color:var(--mut);font-weight:600}
  table.mt td.rk{background:#f1efe8;font-family:ui-monospace,monospace;text-align:left;position:sticky;left:0}
  td.disp{background:var(--lvbg);color:#26215c}.empty{color:var(--danger);background:#fcebeb}.stp{color:var(--mut);background:#f1efe8}
  td.sP2{background:#fbeee7}td.sP6{background:#e3f3ea}td.sP7{background:#fbf0db}td.sP8{background:#e8f1fb}
  .cell.offday{background:#cdd0d7}.cell.offday .dn{color:#5f5e5a}
  .pcell{border-radius:6px;min-height:40px;border:.5px solid var(--line);font-size:12px;padding:3px;cursor:pointer;text-align:center}
  .pcell .dn{color:var(--mut)}
  .pcell.nh{background:#fcebeb;border-color:#e24b4a;color:#a32d2d;font-weight:600}
  .pcell.fx{background:#faeeda;border-color:#ef9f27;color:#633806;font-weight:600}
  .atag{font-size:9px;background:var(--infobg);color:#0c447c;border-radius:3px;padding:0 3px;margin-left:2px}
  .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1c1d22;color:#fff;padding:9px 16px;border-radius:20px;font-size:14px;z-index:50;opacity:0;transition:.25s}
  .toast.show{opacity:.95}
  .mgr{font-size:13px;padding:5px 11px;border-radius:14px;background:var(--lvbg);color:#26215c;border:.5px solid var(--lv);font-weight:600;cursor:pointer}
  .grp{font-size:13px;color:var(--mut);margin:12px 0 6px;font-weight:600}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .warn{display:flex;gap:6px;font-size:13px;background:var(--otbg);color:#633806;padding:9px 11px;border-radius:9px;margin:8px 0}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;justify-content:center;z-index:40}
  .ov.show{display:flex}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:16px;max-height:80vh;overflow-y:auto}
  .sheet h3{margin:0 0 10px;font-size:16px}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:.5px solid var(--line);cursor:pointer}
  .opt:last-child{border:none}
  .sw{width:42px;height:24px;border-radius:13px;background:var(--line);position:relative;flex:none;cursor:pointer}
  .sw.on{background:#5dcaa5}.sw::after{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s}.sw.on::after{left:20px}
  .cell.pickL{background:var(--lvbg);border-color:var(--lv)}.cell.pickL .st{color:#26215c}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="ov" id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="sheet" id="sheet"></div></div>

<script>
// ============================================================
// 設定
// ============================================================
const API_BASE = 'https://script.google.com/macros/s/AKfycbyBVNnL2ZEoGfjFoamaStN8FWc6mCFGez5p_nyxw1uU-JA4wFQIxVOaoQgl_afa2LtDeQ/exec'; // GAS Web App；留空則用內建 mock
const SHIFT_LABEL = {DA:'DA 日A',DB:'DB 日B',NA:'NA 夜A',NB:'NB 夜B'};
const PEER = {DA:'DB',DB:'DA',NA:'NB',NB:'NA'};
const LEAVE_TYPES = ['預排-特休','預排-補休','預排-國假','預排-生理假','預排-事假','預排-家庭照顧假','預排-幼兒照顧假','預排-喪假','預排-健檢假','預排-陪產假','預排-產假','預排-產檢假'];

// ============================================================
// API 層（含樂觀更新 / localStorage 快取）
// ============================================================
// localStorage 安全層（沙箱 iframe 可能擋 localStorage → 改用記憶體）
const _mem={};
const LS={
  get(k){try{return localStorage.getItem(k)}catch(e){return (k in _mem)?_mem[k]:null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){_mem[k]=v}},
  del(k){try{localStorage.removeItem(k)}catch(e){delete _mem[k]}},
  clear(){try{localStorage.clear()}catch(e){}for(const k in _mem)delete _mem[k]}
};
const cache = {
  set(k,d,min=10){LS.set('sc_'+k,JSON.stringify({d,e:Date.now()+min*60000}))},
  get(k){try{const x=JSON.parse(LS.get('sc_'+k));if(!x||Date.now()>x.e)return null;return x.d}catch(e){return null}},
  del(k){LS.del('sc_'+k)}
};
const token = ()=>LS.get('token')||'';
async function api(action,data){
  if(!API_BASE) return mockApi(action,data); // demo 模式
  const res = await fetch(API_BASE,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,token:token(),data})});
  return res.json();
}

// ============================================================
// BBAA 班別曆（前端也算，省往返）
// ============================================================
const BASE = new Date('2026-05-20');
function shiftType(ds){const diff=Math.floor((new Date(ds)-BASE)/86400000);const p=((diff%4)+4)%4;return p<2?'B':'A';}
function groupOf(sf){return (sf==='DA'||sf==='NA')?'A':'B';}
function monthDays(ym){const[y,m]=ym.split('-').map(Number);const n=new Date(y,m,0).getDate();const a=[];for(let d=1;d<=n;d++)a.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);return a;}

// ============================================================
// 狀態 + 路由
// ============================================================
const S = { me:null, ym:'2026-06', tab:'cal', view:'emp' };
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
const app = ()=>document.getElementById('app');
function openModal(html){document.getElementById('sheet').innerHTML=html;document.getElementById('ov').classList.add('show');}
function closeModal(){document.getElementById('ov').classList.remove('show');}

function boot(){
  // 每次開啟一律從登入頁進入（登入時會抓最新角色，不依賴舊快取）
  LS.del('token'); S.me=null; cache.del('me');
  renderLogin();
}

// ── 登入 ─────────────────────────────────────────────────
function renderLogin(){
  app().innerHTML = `
  <div class="body" style="padding-top:60px">
    <div class="card">
      <b style="font-size:18px">排班系統</b>
      <div class="lbl">工號</div><input class="in" id="eid" inputmode="numeric" placeholder="例 095396">
      <div class="lbl">密碼（末4碼）</div><input class="in" id="epw" type="password" inputmode="numeric" placeholder="••••">
      <div class="btn pri" style="margin-top:14px" onclick="doLogin()">登入</div>
      <div style="font-size:12px;color:var(--mut);margin-top:10px">demo：095396 / 5396（黃國化 DA·GL）、152459 / 2459（許志維 NA）</div>
    </div>
  </div>`;
}
async function doLogin(){
  let id=document.getElementById('eid').value.trim().padStart(6,'0'); // 工號補滿6碼
  const pw=document.getElementById('epw').value.trim().padStart(4,'0'); // 末4碼含前導零
  const r = await api('login',{empId:id,pwd:pw});
  if(!r.success){ toast(r.error||'登入失敗'); return; }
  LS.set('token',r.data.token);
  S.me = r.data.employee; cache.set('me',S.me,60*24);
  boot();
}
function logout(){ LS.clear(); S.me=null; renderLogin(); }

// ── 員工頁殼（4 分頁 + 管理切換）─────────────────────────
function isManager(){ return S.me && ['GL','代理GL','admin'].includes(S.me.role); }
function renderEmp(){
  const mgrBtn = isManager()? `<span class="mgr" onclick="S.view='admin';renderAdmin()">⇄ 管理</span>` : '<span></span>';
  app().innerHTML = `
    <div class="top"><b>${S.me.name} · ${SHIFT_LABEL[S.me.shift]||S.me.shift}</b>${mgrBtn}</div>
    <div class="body" id="empbody"></div>
    <div class="tab">
      ${tabBtn('cal','📅','當月班表')}${tabBtn('reg','📝','下月登記')}${tabBtn('ot','🔔','加班通知')}${tabBtn('me','👤','我的')}
    </div>`;
  renderTab();
}
function tabBtn(k,ic,t){return `<div class="${S.tab===k?'on':''}" onclick="S.tab='${k}';renderTab()"><span class="ic">${ic}</span>${t}</div>`;}
function renderTab(){
  document.querySelectorAll('.tab div').forEach(d=>d.classList.remove('on'));
  ({cal:tabCal,reg:tabReg,ot:tabOt,me:tabMe})[S.tab]();
  // 重畫 tab 高亮
  const idx={cal:0,reg:1,ot:2,me:3}[S.tab]; document.querySelectorAll('.tab div')[idx].classList.add('on');
}

// ── 分頁1：當月班表（日曆）──────────────────────────────
async function tabCal(){
  const b=document.getElementById('empbody');
  b.innerHTML = `<div class="card"><div class="row" style="border:none;padding-top:0">
    <span style="cursor:pointer" onclick="chgMonth(-1)">‹</span><b>${S.ym} 班表</b><span style="cursor:pointer" onclick="chgMonth(1)">›</span></div>
    <div id="calwrap">載入中…</div></div>`;
  const ck='sched_'+S.me.empId+'_'+S.ym;
  let d=cache.get(ck);
  if(!d){ const r=await api('getMySchedule',{ym:S.ym}); if(r.success){d=r.data;cache.set(ck,d,30);} }
  if(!d){ document.getElementById('calwrap').textContent='讀取失敗'; return; }
  document.getElementById('calwrap').innerHTML = calHtml(d.days);
}
function calHtml(days){
  const first=new Date(days[0].date).getDay()||7; // 週一=1
  let cells='';
  for(let i=1;i<first;i++) cells+='<div></div>';
  days.forEach(x=>{
    const dn=Number(x.date.slice(8));
    if(x.type==='work'){const m=x.assign&&x.assign.kind==='dispatch'?'<span class="tag">派</span>':(x.assign&&x.assign.toolId||'');cells+=`<div class="cell work"><div class="dn">${dn}</div><div class="st">${x.site||''}</div><div class="mc">${m}</div></div>`;}
    else if(x.type==='ot'){const m=x.assign&&x.assign.kind==='dispatch'?'<span class="tag">派</span>':(x.assign&&x.assign.toolId||'');cells+=`<div class="cell ot"><div class="dn">${dn}</div><div class="st">加班 ${x.site||''}</div><div class="mc">${m}</div></div>`;}
    else if(x.type==='leave'){cells+=`<div class="cell lv"><div class="dn">${dn}</div><div class="st">${(x.leave||'').replace('預排-','')}</div></div>`;}
    else {cells+=`<div class="cell offday"><div class="dn">${dn}</div>${x.block?'<span class="xx">✕</span>':'<div class="st" style="color:#5f5e5a;font-weight:400;font-size:11px">休</div>'}</div>`;}
  });
  return `<div class="cal"><div class="dow">一</div><div class="dow">二</div><div class="dow">三</div><div class="dow">四</div><div class="dow">五</div><div class="dow">六</div><div class="dow">日</div>${cells}</div>
  <div class="legend"><span><i style="background:var(--work)"></i>當班(機台)</span><span><i style="background:var(--ot)"></i>加班</span><span><i style="background:var(--lv)"></i>請假</span><span><b style="color:var(--danger)">✕</b>不可加班</span><span><i class="tag">派</i>派工</span></div>`;
}
function chgMonth(n){const[y,m]=S.ym.split('-').map(Number);const d=new Date(y,m-1+n,1);S.ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;tabCal();}

// ── 分頁2：下月登記（Stage1）— 點月曆選日期填報 ─────────
let regDraft={};   // ds -> 假別；blk_ds -> true(不可加班)
async function tabReg(){
  const b=document.getElementById('empbody');
  const nm=nextMonth();
  // 檢查下月是否已開放填報（管理者確認國假/變形工時後才開放 Stage1）
  b.innerHTML='<div class="card">檢查開放狀態…</div>';
  const cy=await api('getCycle',{ym:nm});
  const mine=cy.success?(cy.data.cycles||[]).find(c=>c.shift===S.me.shift):null;
  if(!mine || mine.stage<1){
    b.innerHTML=`<div class="card" style="text-align:center;color:var(--mut)">
      <div style="font-size:40px">🗓️</div>
      <div style="font-size:15px;margin:8px 0;color:var(--ink)">${nm} 尚未開放填報</div>
      <div style="font-size:13px">管理者確認國假 / 變形工時後才會開放，請稍候。</div></div>`;
    return;
  }
  const days=monthDays(nm);
  const first=new Date(days[0]).getDay()||7;
  let cells='';
  for(let i=1;i<first;i++) cells+='<div></div>';
  days.forEach(ds=>{
    const dn=Number(ds.slice(8));
    const isWork=groupOf(S.me.shift)===shiftType(ds);
    if(regDraft[ds]) cells+=`<div class="cell pickL" onclick="pickDay('${ds}',true)"><div class="dn">${dn}</div><div class="st">${regDraft[ds].replace('預排-','')}</div></div>`;
    else if(regDraft['blk_'+ds]) cells+=`<div class="cell" onclick="pickDay('${ds}',false)"><div class="dn">${dn}</div><span class="xx">✕</span></div>`;
    else cells+=`<div class="cell ${isWork?'':''}" style="${isWork?'':'background:#f7f7f4'}" onclick="pickDay('${ds}',${isWork})"><div class="dn">${dn}</div>${isWork?'<div class="st" style="color:var(--mut);font-weight:400;font-size:11px">出班</div>':''}</div>`;
  });
  b.innerHTML=`<div class="card"><b>Stage1 登記 · ${nm}</b>
    <div style="font-size:12px;color:var(--mut);margin:4px 0 8px">點出班日填假別；點非當班日標不可加班</div>
    <div class="cal"><div class="dow">一</div><div class="dow">二</div><div class="dow">三</div><div class="dow">四</div><div class="dow">五</div><div class="dow">六</div><div class="dow">日</div>${cells}</div>
    <div class="legend"><span><i style="background:var(--lv)"></i>已填假別</span><span><b style="color:var(--danger)">✕</b>不可加班</span><span>淺底=非當班</span></div>
    <div class="btn pri" style="margin-top:12px" onclick="submitReg('${nm}')">送出 Stage1 登記</div>
    <div style="font-size:12px;color:var(--mut);margin-top:8px">送出前系統會檢查連七，違規會擋。</div></div>`;
}
function pickDay(ds,isWork){
  const lbl=ds.slice(5).replace('-','/');
  if(isWork){
    const opts=LEAVE_TYPES.map(l=>`<div class="opt" onclick="setLeave('${ds}','${l}')"><span>${l}</span>${regDraft[ds]===l?'<b style="color:var(--ok)">✓</b>':''}</div>`).join('');
    openModal(`<h3>${lbl} 出班日 · 選假別</h3>${opts}
      <div class="opt" onclick="setLeave('${ds}','')"><span style="color:var(--mut)">清除（全勤）</span></div>`);
  }else{
    const on=regDraft['blk_'+ds];
    openModal(`<h3>${lbl} 非當班日</h3>
      <div class="opt" onclick="setBlock('${ds}',${!on})"><span>✕ 標記不可加班</span><span class="sw ${on?'on':''}"></span></div>`);
  }
}
function setLeave(ds,l){ if(l)regDraft[ds]=l; else delete regDraft[ds]; closeModal(); tabReg(); }
function setBlock(ds,v){ if(v)regDraft['blk_'+ds]=true; else delete regDraft['blk_'+ds]; closeModal(); tabReg(); }
async function submitReg(nm){
  const items=[];
  Object.keys(regDraft).forEach(k=>{
    if(k.startsWith('blk_')){ if(regDraft[k]) items.push({date:k.slice(4),type:'block'}); }
    else if(regDraft[k]) items.push({date:k,type:'leave',leave_type:regDraft[k]});
  });
  if(!items.length){toast('尚未選擇');return;}
  toast('已送出（'+items.length+'筆）'); // 樂觀更新
  const r=await api('submitRequest',{ym:nm,items});
  if(r.success){regDraft={};} else toast('送出失敗：'+r.error);
}
function nextMonth(){const[y,m]=S.ym.split('-').map(Number);const d=new Date(y,m,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}

// ── 分頁3：加班通知 ──────────────────────────────────────
function tabOt(){
  document.getElementById('empbody').innerHTML=`<div class="card"><b>加班通知</b>
    <div class="warn">7/05（六）P8 加班邀請 · 剩 41:20</div>
    <div class="g2"><div class="btn" style="background:var(--okbg);color:var(--ok);border-color:#5dcaa5" onclick="otReply(true)">接受</div>
    <div class="btn dg" onclick="otReply(false)">拒絕</div></div>
    <div class="lbl">接受→選類別</div>
    <select class="in"><option>加班-報補休</option><option>加班-報加班費</option></select>
    <div style="font-size:12px;color:var(--mut);margin-top:8px">進系統時自動檢查未讀加班通知。</div></div>`;
}
function otReply(ok){ toast(ok?'已接受':'已拒絕，將詢問是否參加第二輪'); }

// ── 分頁4：我的 ─────────────────────────────────────────
function tabMe(){
  const sk=(S.me.skills||[]).join('、')||'—';
  document.getElementById('empbody').innerHTML=`<div class="card">

function cycleCalHtml(nm){
  const days=monthDays(nm), first=new Date(days[0]).getDay()||7;
  let c=''; for(let i=1;i<first;i++)c+='<div></div>';
  days.forEach(ds=>{const dn=Number(ds.slice(8));const cls=cycleDraft.nh[ds]?'nh':cycleDraft.fx[ds]?'fx':'';c+=`<div class="pcell ${cls}" onclick="cycPick('${ds}')"><div class="dn">${dn}</div></div>`;});
  return `<div class="cal"><div class="dow">一</div><div class="dow">二</div><div class="dow">三</div><div class="dow">四</div><div class="dow">五</div><div class="dow">六</div><div class="dow">日</div>${c}</div>`;
}
function cycPick(ds){
  const m=cycleDraft.pickMode, other=m==='nh'?'fx':'nh';
  if(cycleDraft[m][ds]) delete cycleDraft[m][ds]; else { cycleDraft[m][ds]=true; delete cycleDraft[other][ds]; }

}

let _static=null;
async function loadStatic(force){

function gridHtml(g){
  if(g.notCreated) return `<div style="padding:16px;text-align:center;color:var(--mut)">
    <div style="font-size:15px;margin-bottom:8px">尚未建立此月份</div>
    <div class="btn pri" style="display:inline-flex;width:auto;padding:8px 16px" onclick="admCycle()">前往建立月份</div></div>`;
  if(!g.rows.length) return '<div style="padding:10px;color:var(--mut)">尚無資料（需先建立月份/排班）</div>';
  const tmap={}; ((_static&&_static.tools)||[]).forEach(t=>tmap[t.tool_id]=t.site);
  const siteOf=rk=>String(rk).charAt(0)==='@'?rk.slice(1):tmap[rk];
  let h='<table class="mt"><tr><th>機台\\日</th>'+g.days.map(d=>`<th>${Number(d.slice(8))}</th>`).join('')+'</tr>';
  g.rows.forEach(r=>{
    const disp=String(r.rowKey).charAt(0)==='@'; const site=siteOf(r.rowKey);
    const sc=site?(' s'+site):'';
    h+=`<tr><td class="rk${sc}">${r.rowKey}</td>`+r.cells.map(c=>{
      let cls=disp?'disp':sc.trim(); if(c==='空機')cls='empty'; if(['停機','DOWN','CRYO','OFF','TEST'].includes(c))cls='stp';
      return `<td class="${cls}">${c||''}</td>`;
    }).join('')+'</tr>';
  });
  return h+'</table>';
}

function mockApi(action,data){
  return new Promise(res=>setTimeout(()=>res(mock(action,data)),120));
}
function mock(action,data){
  const EMP={'095396':{empId:'095396',name:'黃國化',shift:'DA',site:'P6',role:'GL',skills:['nonCS','REMOTE','GL派工']},
             '152459':{empId:'152459',name:'許志維',shift:'NA',site:'P8',role:'employee',skills:['nonCS','CS','ARM','AUTO']}};
  if(action==='login'){const e=EMP[data.empId];if(e&&data.pwd===data.empId.slice(-4))return{success:true,data:{token:'mock',employee:e}};return{success:false,error:'帳密錯誤(demo:095396/5396)'};}
  if(action==='getMySchedule'){
    const days=monthDays(data.ym).map(ds=>{
      const work=groupOf(S.me.shift)===shiftType(ds);
      if(!work) return {date:ds,type:'off'};
      const dn=Number(ds.slice(8));
      if(dn%7===5) return {date:ds,type:'leave',leave:'預排-特休'};
      if(dn%5===0) return {date:ds,type:'ot',site:'P8',assign:{kind:'machine',toolId:'LXTM04'}};
      return {date:ds,type:'work',site:S.me.site,assign:{kind:dn%3===0?'dispatch':'machine',toolId:'BXTM0'+(dn%8+1)}};
    });
    return {success:true,data:{empId:S.me.empId,name:S.me.name,shift:S.me.shift,days}};
  }
  if(action==='getMachineTable'){
    const days=monthDays(data.ym).filter(ds=>groupOf(data.shift)===shiftType(ds)).slice(0,6);
    const rows=[['@P2','楊于慶','','郭紫妍','楊于慶','楊于慶','楊于慶'],['@P6','李欽翔','李欽翔','郭紫妍','李欽翔','李欽翔','李欽翔'],
      ['@P8','徐淨','徐淨','洪珮鈴','徐淨','徐淨','徐淨'],['BXTM01','吳冠宇','梁庭銓','空機','楊子玄','楊子玄','梁'],
      ['BXTM02','曹子茵','曹子茵','曹子茵','曹子茵','梁庭銓','曹'],['LXTM04','洪珮鈴','洪珮鈴','DOWN','郭存榮','郭存榮','郭']]
      .map(r=>({rowKey:r[0],cells:r.slice(1,days.length+1)}));
    return {success:true,data:{days,rows}};
  }
  if(action==='submitRequest'||action==='autoAssign') return {success:true,data:{}};
  return {success:true,data:{}};
}
